
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Link Bio</title>

<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    transition: 0.3s;
}

/* DARK MODE */
body.light {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: black;
}

/* ===== CONTAINER ===== */
.container {
    text-align: center;
    animation: fadeIn 1s ease;
}

/* ===== AVATAR ===== */
.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    margin-bottom: 15px;
}

/* ===== TEXT ===== */
h1 {
    font-size: 24px;
}
p {
    opacity: 0.8;
    margin-bottom: 20px;
}

/* ===== BUTTON ===== */
.link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 260px;
    margin: 10px auto;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

/* Hover effect */
.link-btn:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
}

/* ICON */
.icon {
    font-size: 18px;
}

/* Ripple effect */
.link-btn span.ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple 0.5s linear;
    background: rgba(255,255,255,0.6);
}

/* ===== DARK MODE BUTTON ===== */
.toggle {
    margin-top: 15px;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.7;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes ripple {
    to {
        transform: scale(4);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- AVATAR -->
    <img src="https://s6.ezgif.com/tmp/ezgif-607b8c539a9d3b70.jpg" class="avatar">

    <!-- NAME + BIO -->
    <h1>Tien Dat</h1>
    <p> nee nee </p>

    <!-- LINKS -->
    <a href="https://www.facebook.com/share/18Eujnp62e/?mibextid=wwXIfr" target="_blank" class="link-btn">
        <span class="icon">🤍</span> Facebook
    </a>

    <a href="https://www.instagram.com/tadt_07?igsh=MWlhYmVrMms0OXRhcw%3D%3D&utm_source=qr" target="_blank" class="link-btn">
        <span class="icon">🫶</span> Instagram
    </a>

    <a href="https://locket.cam/tiendat05" target="_blank" class="link-btn">
        <span class="icon">♡</span> Locket
    </a>

    <a href="https://www.tiktok.com/@tadt_07?is_from_webapp=1&sender_device=pc" target="_blank" class="link-btn">
        <span class="icon">💛</span> TikTok
    </a>

    <!-- DARK MODE -->
    <div class="toggle" onclick="toggleMode()">🌙 Đổi chế độ</div>

</div>

<script>
// ===== DARK MODE =====
function toggleMode() {
    document.body.classList.toggle("light");
}

// ===== RIPPLE EFFECT =====
const buttons = document.querySelectorAll('.link-btn');

buttons.forEach(btn => {
    btn.addEventListener('click', function(e) {
        const circle = document.createElement("span");
        circle.classList.add("ripple");

        const rect = btn.getBoundingClientRect();
        circle.style.left = e.clientX - rect.left + "px";
        circle.style.top = e.clientY - rect.top + "px";

        btn.appendChild(circle);

        setTimeout(() => circle.remove(), 500);
    });
});
</script>

</body>
</html>
